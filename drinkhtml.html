<form name = "adddrink">

  <div id="ingredient">

  <button onclick="addIngredient()" value="Add Ingredient">Add Ingredient</button>
  <br><br>

</form> 

<script>
function addIngredient(){
  event.preventDefault();
  var container = document.getElementById('ingredient');
  
  const newElem = document.createElement("label");
  newElem.setAttribute("for","ingredient");
  container.appendChild(newElem);
}

</script>
